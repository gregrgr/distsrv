name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0) — created if missing'
        required: true
        default: 'v0.0.0-test'

permissions:
  contents: write   # needed to create release + upload assets

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # for `git describe`

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
          cache: true

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: Build all release artifacts
        run: |
          make release-all VERSION="${{ steps.ver.outputs.version }}"
          ls -lh dist/

      - name: Generate release notes body
        id: notes
        run: |
          cat > release-notes.md <<'MD'
          ## Install

          ### Server (Ubuntu 22.04 / 24.04)
          ```bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.version }}/distsrv-${{ steps.ver.outputs.version }}-linux-amd64.tar.gz | tar -xz -C ~/distsrv-deploy
          cd ~/distsrv-deploy && sudo ./deploy.sh
          ```
          arm64 server: replace `linux-amd64` with `linux-arm64`.

          ### Mac CLI (one-liner)
          ```bash
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.ver.outputs.version }}/mac/install-remote.sh | bash
          ```
          Or download the tarball below manually:
          - Apple Silicon (M1/M2/M3): `distsrv-cli-${{ steps.ver.outputs.version }}-darwin-arm64.tar.gz`
          - Intel Mac: `distsrv-cli-${{ steps.ver.outputs.version }}-darwin-amd64.tar.gz`

          ### Verify
          ```bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.version }}/SHA256SUMS.txt | sha256sum -c --ignore-missing
          ```
          MD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.version }}
          name: ${{ steps.ver.outputs.version }}
          body_path: release-notes.md
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/distsrv-*-linux-amd64.tar.gz
            dist/distsrv-*-linux-arm64.tar.gz
            dist/distsrv-cli-*-darwin-arm64.tar.gz
            dist/distsrv-cli-*-darwin-amd64.tar.gz
            dist/distsrv-cli-*-linux-amd64.tar.gz
            dist/distsrv-cli-*-linux-arm64.tar.gz
            dist/distsrv-cli-*-windows-amd64.tar.gz
            dist/SHA256SUMS.txt
